<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Quick Capture</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Quick Capture" />
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    .app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 10px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: #6c63ff; }

    .user-btn {
      background: #2a2a4a;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      text-align: center;
    }

    #login-screen p {
      color: #aaa;
      font-size: 16px;
      max-width: 280px;
      line-height: 1.5;
    }

    #capture-screen {
      flex: 1;
      display: none;
      flex-direction: column;
      gap: 16px;
      padding-top: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea {
      background: #2a2a4a;
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: #fff;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    input::placeholder, textarea::placeholder { color: #666; }

    input:focus, textarea:focus {
      border-color: #6c63ff;
    }

    textarea {
      resize: none;
      height: 100px;
      line-height: 1.5;
    }

    .btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:hover { background: #5a52e0; }

    .btn.secondary {
      background: #2a2a4a;
      font-weight: 600;
      font-size: 15px;
      padding: 14px;
    }

    .btn:disabled {
      background: #3a3a5a;
      cursor: not-allowed;
      transform: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #2a2a4a;
      border: 1px solid #6c63ff;
      color: #fff;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.3s ease;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: #4caf50; }
    .toast.error { border-color: #f44336; }

    .recent-label {
      font-size: 13px;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 8px;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recent-item {
      background: #2a2a4a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.4;
    }

    .recent-item .task-title { font-weight: 600; color: #fff; }
    .recent-item .task-meta { color: #888; font-size: 12px; margin-top: 2px; }

    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Quick<span>Capture</span></h1>
    <button class="user-btn" id="user-btn" title="Sign out">👤</button>
  </header>

  <div id="login-screen">
    <div class="logo">⚡</div>
    <p>Sign in with your ETTC Microsoft 365 account to start capturing tasks.</p>
    <button class="btn" id="login-btn">Sign in with Microsoft</button>
  </div>

  <div id="capture-screen">
    <div class="field">
      <label>Client</label>
      <input id="client" type="text" placeholder="Client name..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Caller</label>
      <input id="caller" type="text" placeholder="Caller name..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Task</label>
      <textarea id="task" placeholder="What do you need to do?"></textarea>
    </div>
    <button class="btn" id="submit-btn">Add Task →</button>

    <div class="recent-label">Recent</div>
    <div class="recent-list" id="recent-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CLIENT_ID = '8da23227-ca27-466d-8911-a82fd90e6e96';
  const TENANT_ID = 'a21ae40e-f105-4507-8bec-79afa6d5afb8';

  const msalConfig = {
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: window.location.origin + window.location.pathname,
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true }
  };

  const msalInstance = new msal.PublicClientApplication(msalConfig);
  const SCOPES = ['Tasks.ReadWrite'];

  let recent = JSON.parse(localStorage.getItem('recent') || '[]');

  async function init() {
    await msalInstance.initialize();
    const response = await msalInstance.handleRedirectPromise();
    if (response) setAccount(response.account);

    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      setAccount(accounts[0]);
      showCapture();
    }
    renderRecent();
  }

  function setAccount(account) {
    document.getElementById('user-btn').title = account.username + ' (tap to sign out)';
    document.getElementById('user-btn').textContent = account.name ? account.name[0].toUpperCase() : '👤';
  }

  function showCapture() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('capture-screen').style.display = 'flex';
  }

  async function getToken() {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length === 0) throw new Error('Not signed in');
    try {
      const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      return result.accessToken;
    } catch {
      const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
      return result.accessToken;
    }
  }

  async function getDefaultListId(token) {
    const res = await fetch('https://graph.microsoft.com/v1.0/me/todo/lists', {
      headers: { Authorization: `Bearer ${token}` }
    });
    const data = await res.json();
    const list = data.value.find(l => l.wellknownListName === 'defaultList') || data.value[0];
    return list.id;
  }

  async function addTask(client, caller, task) {
    const token = await getToken();
    const listId = await getDefaultListId(token);
    const res = await fetch(`https://graph.microsoft.com/v1.0/me/todo/lists/${listId}/tasks`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title: task,
        body: { contentType: 'text', content: `Client: ${client}\nCaller: ${caller}` },
        importance: 'normal'
      })
    });
    if (!res.ok) throw new Error('Failed to add task');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  function renderRecent() {
    const list = document.getElementById('recent-list');
    list.innerHTML = recent.slice(0, 3).map(r => `
      <div class="recent-item">
        <div class="task-title">${r.task}</div>
        <div class="task-meta">${r.client} · ${r.caller}</div>
      </div>
    `).join('');
  }

  document.getElementById('login-btn').addEventListener('click', () => {
    msalInstance.loginRedirect({ scopes: SCOPES });
  });

  document.getElementById('user-btn').addEventListener('click', () => {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      if (confirm('Sign out?')) msalInstance.logoutRedirect();
    }
  });

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const client = document.getElementById('client').value.trim();
    const caller = document.getElementById('caller').value.trim();
    const task = document.getElementById('task').value.trim();

    if (!client || !caller || !task) {
      showToast('Fill in all fields', 'error');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      await addTask(client, caller, task);
      recent.unshift({ client, caller, task, time: new Date().toISOString() });
      recent = recent.slice(0, 10);
      localStorage.setItem('recent', JSON.stringify(recent));
      renderRecent();
      document.getElementById('client').value = '';
      document.getElementById('caller').value = '';
      document.getElementById('task').value = '';
      document.getElementById('client').focus();
      showToast('✓ Task added to To Do');
    } catch (e) {
      showToast('Failed to add task', 'error');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Task →';
    }
  });

  // Submit on Ctrl+Enter
  document.getElementById('task').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      document.getElementById('submit-btn').click();
    }
  });

  init();
</script>
</body>
</html>
